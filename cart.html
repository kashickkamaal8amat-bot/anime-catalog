<!DOCTYPE html>

<html>

<head>

<title>Your Cart</title>

<style>

body{
margin:0;
font-family:'Times New Roman', Times, serif;
background:#0f0f1a;
color:white;
}

header{
background:#141428;
padding:20px;
text-align:center;
}

header h1{
margin:0;
color:#ff4c8b;
}

nav{
background:#1c1c35;
padding:10px;
text-align:center;
}

nav a{
color:white;
text-decoration:none;
margin:0 15px;
font-weight:bold;
}

nav a:hover{
color:#ff4c8b;
}

.container{
padding:30px;
display:grid;
grid-template-columns:repeat(3,minmax(280px,320px));
gap:20px;
justify-content:center;
}

.card{
background:#1c1c35;
border-radius:10px;
overflow:hidden;
transition:.3s;
display:flex;
flex-direction:column;
}

.card:hover{
transform:scale(1.05);
}

.card img{
width:100%;
height:275px;
object-fit:cover;
}

.card-content{
padding:15px;
display:flex;
flex-direction:column;
}

.card-content h2{
color:#ff4c8b;
margin:0 0 10px 0;
}

.card-content ul{
padding-left:20px;
line-height:1.5;
}

.price{
color:#00ffcc;
font-weight:bold;
margin-top:8px;
}

.qty-box{
display:flex;
align-items:center;
gap:10px;
margin-top:10px;
}

.qty-btn{
padding:5px 10px;
border:none;
background:#ff4c8b;
color:white;
border-radius:5px;
cursor:pointer;
font-size:16px;
}

.remove-btn{
margin-top:10px;
padding:8px;
border:none;
background:#ff4c8b;
color:white;
border-radius:6px;
cursor:pointer;
}

.remove-btn:hover{
background:#ff2a72;
}

.subtotal{
margin-top:6px;
color:#00ffcc;
font-size:15px;
}

.total-box{
text-align:center;
font-size:24px;
margin-top:20px;
color:#00ffcc;
}

footer{
background:#141428;
text-align:center;
padding:15px;
margin-top:30px;
}

</style>

</head>



<body>

<header>

<h1>Your Cart 🛒</h1>

</header>


<nav>

<a href="index.html">Home</a>

<a href="purchase-manga.html">Shop</a>

</nav>



<div class="container" id="cart-container">

</div>


<div class="total-box" id="total-price">

</div>



<footer>

© 2026 Anime Store | Built by Ashick

</footer>




<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

function renderCart(){

let container = document.getElementById("cart-container");

container.innerHTML = "";

let total = 0;

cart.forEach((item,index)=>{

let subtotal = item.price * item.qty;

total += subtotal;

container.innerHTML += `

<div class="card">

<img src="${item.img}">

<div class="card-content">

<h2>${item.name}</h2>

<ul>

<li><strong>Season:</strong> ${item.season}</li>

<li><strong>Edition:</strong> ${item.edition}</li>

<li><strong>Author:</strong> ${item.author}</li>

<li><strong>Volume:</strong> ${item.volume}</li>

</ul>

<div class="price">Price : ₹${item.price}</div>

<div class="qty-box">

<button class="qty-btn"
onclick="changeQty(${index},-1)">−</button>

<span>${item.qty}</span>

<button class="qty-btn"
onclick="changeQty(${index},1)">+</button>

</div>

<div class="subtotal">

Subtotal : ₹${subtotal}

</div>

<button class="remove-btn"
onclick="removeItem(${index})">

❌ Remove

</button>

</div>

</div>

`;

});

document.getElementById("total-price").innerHTML =
"Total Amount : ₹" + total;

localStorage.setItem("cart",JSON.stringify(cart));

}



function changeQty(index,amount){

cart[index].qty += amount;

if(cart[index].qty < 1){

cart[index].qty = 1;

}

renderCart();

}



function removeItem(index){

cart.splice(index,1);

renderCart();

}


renderCart();

</script>



</body>

</html>
